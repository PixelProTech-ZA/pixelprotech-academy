    id:'advanced-computers', icon:'⚡', name:'Advanced Computers', level:'adv',
    levelLabel:'ADVANCED', color:'purple', duration:'5 Days', lessons:4,
    desc:'Networking, cloud storage, security, troubleshooting, and productivity tools for the serious digital professional.',
    jobs:'Tech Support, Senior Admin, IT Junior',
    topics:['Networking basics','Cloud platforms','Cybersecurity','System maintenance','Productivity tools'],
    lessonData:[
      {title:'Networking Fundamentals',type:'lesson',xp:90,blocks:[{type:'text',content:`<h3>HOW NETWORKS WORK</h3><p>Every office runs on a network. Understanding how networks function makes you the most valuable person in any room.</p><p><strong>Key networking concepts:</strong></p><ul><li><strong>IP Address</strong> — The unique address of every device on a network (e.g. 192.168.1.5)</li><li><strong>Router</strong> — Connects your network to the internet and assigns IP addresses</li><li><strong>Switch</strong> — Connects multiple devices on the same local network</li><li><strong>DNS</strong> — Domain Name System. Translates website names (google.com) to IP addresses</li><li><strong>DHCP</strong> — Automatically assigns IP addresses to devices joining the network</li></ul><div class="highlight">🌐 PRACTICAL: When you type "google.com" in a browser: your computer asks the DNS server for Google's IP address → connects to that IP → Google's server responds with the webpage. This happens in milliseconds.</div>`},{type:'quiz',question:'What does DNS stand for and what does it do?',opts:['Data Network Switch — connects devices','Domain Name System — translates website names to IP addresses','Digital Network Security — protects your connection','Direct Network Signal — boosts Wi-Fi strength'],correct:1,explanation:'DNS = Domain Name System. It\'s like the internet\'s phone book — when you type a website name, DNS finds its IP address so your computer knows where to connect. Without DNS, you\'d need to type IP addresses for every website.'}]},
      {title:'Cloud Storage & Collaboration',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>THE CLOUD — WORK FROM ANYWHERE</h3><p>Cloud storage means your files live on servers over the internet — accessible from any device, anywhere. This has transformed how offices work.</p><p><strong>Main cloud platforms:</strong></p>`,},{type:'table',headers:['Platform','Provider','Best For'],rows:[['OneDrive','Microsoft','Office 365 users, Windows'],['Google Drive','Google','Gmail users, cross-platform'],['Dropbox','Dropbox Inc','File sharing with external parties'],['iCloud','Apple','Mac and iPhone users']]},{type:'text',content:`<p><strong>Cloud benefits:</strong></p><ul><li>Access files from any device — PC, phone, tablet</li><li>Automatic backup — files are safe even if your PC dies</li><li>Real-time collaboration — multiple people edit the same document simultaneously</li><li>Easy sharing — send a link instead of emailing large files</li></ul><div class="tip">💡 OneDrive comes free with Windows. Make it a habit to save important work documents to OneDrive — not just the local hard drive. If your PC crashes, cloud files are safe.</div>`},{type:'quiz',question:'What is the main advantage of saving files to cloud storage instead of only your local hard drive?',opts:['Files are larger','Files are accessible from any device and are backed up automatically','Files are deleted faster','Files are private and cannot be shared'],correct:1,explanation:'Cloud storage provides automatic backup and accessibility from any device. If your hard drive fails (and they do fail), locally-saved-only files are gone. Cloud files survive hardware failure because they live on remote servers.'}]},
      {title:'Cybersecurity Essentials',type:'lesson',xp:100,blocks:[{type:'text',content:`<h3>CYBERSECURITY — PROTECTING YOU AND YOUR EMPLOYER</h3><p>Cyberattacks cost South African businesses billions of rands annually. A single employee clicking a malicious link can compromise an entire organisation.</p><p><strong>The main threats:</strong></p><ul><li><strong>Ransomware</strong> — Malware that encrypts all your files and demands payment to unlock them</li><li><strong>Phishing</strong> — Fake emails designed to steal credentials or install malware</li><li><strong>Social engineering</strong> — Manipulating people (not systems) to gain unauthorised access</li><li><strong>Weak passwords</strong> — The #1 cause of data breaches</li><li><strong>Unpatched software</strong> — Outdated software contains vulnerabilities that hackers exploit</li></ul><div class="highlight">🔐 THE MOST POWERFUL SECURITY HABIT: Enable Two-Factor Authentication (2FA) on every important account. Even if your password is stolen, the attacker cannot log in without the second factor (usually an SMS code).</div>`},{type:'quiz',question:'What is Two-Factor Authentication (2FA)?',opts:['Using two different passwords','A login method requiring both a password AND a second verification (e.g. SMS code)','Having two email accounts','Changing your password twice a month'],correct:1,explanation:'2FA = Two-Factor Authentication. After entering your password (factor 1), you must verify with something you have — like a code sent to your phone (factor 2). Even if a hacker steals your password, they cannot access your account without your phone.'}]},
      {title:'System Maintenance & Optimisation',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>KEEPING YOUR SYSTEM FAST & HEALTHY</h3><p>A poorly maintained computer slows down, crashes, and becomes a source of daily frustration. Preventive maintenance takes 15 minutes and saves hours.</p><p><strong>Weekly habits:</strong></p><ul><li>Close programs you're not using</li><li>Empty the Recycle Bin</li><li>Run Windows Update (Settings → Update & Security → Windows Update)</li></ul><p><strong>Monthly maintenance:</strong></p><ul><li>Run Disk Cleanup (search "Disk Cleanup" in Start Menu)</li><li>Check startup programs (Task Manager → Startup tab) — disable unnecessary ones</li><li>Run a malware scan</li><li>Check available disk space — keep at least 15% free</li></ul><div class="tip">💡 If your PC is slow: Press Ctrl+Shift+Esc to open Task Manager → click "CPU" or "Memory" column to sort → identify what's using the most resources. A programme consuming 90% CPU when it should use 2% is your problem.</div>`},{type:'quiz',question:'In Task Manager, what keyboard shortcut opens it directly?',opts:['Ctrl+Alt+T','Ctrl+Shift+Esc','Windows+T','Alt+Ctrl+M'],correct:1,explanation:'Ctrl+Shift+Esc opens Task Manager directly. Ctrl+Alt+Del opens the security screen where you can then choose Task Manager. Ctrl+Shift+Esc is faster — saves one extra step.'}]}
    ]
  },
  {
    id:'cv-creation', icon:'📝', name:'CV Creation', level:'beg',
    levelLabel:'BEGINNER', color:'teal', duration:'Half Day', lessons:2,
    desc:'Build a professional South African CV from scratch. The document between you and your next job — done right.',
    jobs:'Job seekers — all fields',
    topics:['CV structure','Personal statement','Skills section','Work experience formatting'],
    lessonData:[
      {title:'CV Structure & Layout',type:'lesson',xp:60,blocks:[{type:'text',content:`<h3>THE WINNING CV FORMULA</h3><p>Your CV has 10-15 seconds to make an impression. South African employers expect a specific format. Here it is.</p><p><strong>Non-negotiable sections:</strong></p><ul><li><strong>Header</strong> — Full name (large, bold), phone, email, location, ID number</li><li><strong>Personal Profile/Statement</strong> — 3-4 sentences. Who you are + key skill + career goal</li><li><strong>Key Skills</strong> — Bullet list of 6-8 most relevant skills for the role</li><li><strong>Work Experience</strong> — Reverse chronological. For each: dates, company, title, 3-5 bullet duties</li><li><strong>Education</strong> — Reverse chronological. Year, institution, qualification, subjects if relevant</li><li><strong>Certifications/Courses</strong> — PixelProTech certifications go here ✅</li><li><strong>References</strong> — "Available upon request" is acceptable</li></ul><div class="highlight">📄 LENGTH: 2 pages maximum for less than 5 years experience. 3 pages maximum for senior roles. Hiring managers do not read past page 2 for junior positions.</div>`},{type:'quiz',question:'What is the maximum recommended CV length for someone with less than 5 years of work experience?',opts:['1 page','2 pages','4 pages','As long as needed'],correct:1,explanation:'2 pages maximum for entry-level and junior positions. Recruiters and HR managers screen hundreds of CVs — they will not read page 3 of a junior candidate\'s CV. Keep it tight, relevant, and focused.'}]},
      {title:'Writing Your Personal Statement',type:'practice',xp:80,blocks:[{type:'text',content:`<h3>THE PERSONAL STATEMENT — YOUR 30-SECOND PITCH</h3><p>This is the paragraph at the top of your CV. It's the first thing read and sets the tone for everything that follows. Write it last — after you know what the rest of your CV contains.</p><p><strong>Formula that works:</strong></p><p>[Job title/field] with [X years / recent training] in [key skills]. [2-3 sentence description of what you bring and what you're looking for].</p><p><strong>Example (entry level, data capture):</strong></p><p><em>"Motivated and detail-oriented administrative professional with recent training in data capture, Microsoft Office, and computer literacy from PixelProTech Solutions. I bring strong keyboard accuracy, a professional approach to data handling, and a genuine commitment to accuracy and efficiency. I am seeking an entry-level data capture or administrative role where I can contribute immediately and grow within an organisation."</em></p><div class="tip">💡 Tailor your personal statement for each application. Change the role title and add one specific detail from the job advertisement. It takes 3 minutes and dramatically improves your response rate.</div>`},{type:'practice',task:'Write the OPENING sentence of a personal statement for someone applying for a receptionist position',hint:'Include your field, training, and a key strength',placeholder:'Write your opening sentence...',answer:'Professionally trained receptionist and office administrator',points:50}]}
    ]
  },
  {
    id:'digital-job-prep', icon:'💼', name:'Digital Job Preparation', level:'int',
    levelLabel:'INTERMEDIATE', color:'purple', duration:'2 Days', lessons:3,
    desc:'Interview skills, digital portfolio, LinkedIn, online job searching, and how to present yourself digitally.',
    jobs:'All job seekers',
    topics:['Interview preparation','LinkedIn basics','Online job searching','Digital first impressions'],
    lessonData:[
      {title:'Interview Preparation',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>THE JOB INTERVIEW — YOUR PERFORMANCE</h3><p>Interviews are not tests of who you are — they are performances of your professional best. Preparation is what separates candidates who get offers from those who wonder what went wrong.</p><p><strong>The STAR method for answering questions:</strong></p><ul><li><strong>S — Situation:</strong> Describe the context</li><li><strong>T — Task:</strong> What was your responsibility</li><li><strong>A — Action:</strong> What you specifically did</li><li><strong>R — Result:</strong> What happened because of your action</li></ul><p><strong>Questions to prepare for:</strong></p><ul><li>"Tell me about yourself" — 60-second professional summary</li><li>"Why do you want this role?" — Researched, specific answer about THEIR company</li><li>"What are your strengths?" — 2-3 backed by evidence</li><li>"What's your weakness?" — Real weakness + how you're addressing it</li><li>"Do you have questions for us?" — ALWAYS have 2-3 prepared questions</li></ul><div class="highlight">💡 RESEARCH THE COMPANY before every interview. Check their website, recent news, and LinkedIn page. Reference something specific you found: "I read that your company recently expanded to three new provinces — I'd love to be part of that growth."</div>`},{type:'quiz',question:'What does the "R" stand for in the STAR interview technique?',opts:['Responsibility','Reasoning','Result','Role'],correct:2,explanation:'STAR = Situation, Task, Action, RESULT. The Result is the most important part — it shows the impact of your actions. Interviewers want evidence that your actions lead to positive outcomes.'}]},
      {title:'LinkedIn — Your Digital Professional Profile',type:'lesson',xp:70,blocks:[{type:'text',content:`<h3>LINKEDIN — WHERE EMPLOYERS FIND YOU</h3><p>LinkedIn has over 900 million users. South African employers and recruiters actively search it daily. Not being on LinkedIn means being invisible to a huge slice of the job market.</p><p><strong>Profile essentials:</strong></p><ul><li><strong>Professional photo</strong> — Head and shoulders, plain background, business dress, smile</li><li><strong>Headline</strong> — Not just your job title: "Admin Professional | Data Capture | Microsoft Office Specialist | PixelProTech Certified"</li><li><strong>Summary (About section)</strong> — Your personal statement, 3-5 sentences</li><li><strong>Work Experience</strong> — Same as your CV, with descriptions</li><li><strong>Skills section</strong> — Add all your technical skills, request endorsements</li><li><strong>Certifications</strong> — Add PixelProTech courses here</li></ul><div class="tip">💡 CONNECTION STRATEGY: Connect with everyone you meet professionally. A second-degree connection to a recruiter can be the difference between getting seen and being filtered out. Quality AND quantity matter on LinkedIn.</div>`},{type:'quiz',question:'On LinkedIn, what should your headline include beyond just your job title?',opts:['Your salary expectations','Key skills and certifications','Your personal interests','Your home address'],correct:1,explanation:'Your LinkedIn headline is searchable. Including key skills, certifications, and specialisations means recruiters searching for "Data Capture Pretoria" or "Office Admin Microsoft Office" are more likely to find your profile. Maximise keyword coverage.'}]},
      {title:'Online Job Searching in South Africa',type:'lesson',xp:60,blocks:[{type:'text',content:`<h3>WHERE TO FIND JOBS IN SOUTH AFRICA</h3><p>Most job seekers use 1-2 platforms. Professional job seekers use a multi-channel approach across 5+ platforms simultaneously.</p>`,},{type:'table',headers:['Platform','Type','Best For'],rows:[['LinkedIn','Professional network','Professional, corporate, remote'],['PNet (pnet.co.za)','Job board','All industries, all levels'],['Indeed (indeed.co.za)','Job aggregator','Volume searching across many sites'],['Careers24','Job board','SA-focused, all sectors'],['ESSA (essa.org.za)','Government','Government learnerships & jobs'],['Company websites','Direct','Apply directly — less competition']]},{type:'quiz',question:'Why is applying directly on company websites often MORE effective than job boards?',opts:['Company websites are easier to use','There is less competition from other applicants','Company websites have better job descriptions','Job boards charge application fees'],correct:1,explanation:'When you apply via a company\'s own careers page, your application isn\'t competing with thousands on a job board — it goes directly to HR. Companies also often post roles internally and on their own site before listing on job boards.'}]}
    ]
  },
  {
    id:'tech-support', icon:'🔧', name:'Tech Support Basics', level:'tech',
    levelLabel:'TECH', color:'orange', duration:'3 Days', lessons:3,
    desc:'First-level IT support: diagnosing problems, user assistance, documentation, and the entry point to IT careers.',
    jobs:'Helpdesk, Junior IT Support, Tech Support Agent',
    topics:['Support processes','Diagnosing issues','User communication','Ticketing basics'],
    lessonData:[
      {title:'The IT Support Process',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>HOW IT SUPPORT WORKS</h3><p>IT support follows a structured process. Understanding this process is the difference between a professional tech support agent and someone who just "messes around with computers."</p><p><strong>The support tier structure:</strong></p><ul><li><strong>Tier 1 (You)</strong> — First contact. Handles 80% of issues: password resets, software installs, common errors, connectivity</li><li><strong>Tier 2</strong> — Escalated technical issues: advanced software, hardware replacement, network configuration</li><li><strong>Tier 3</strong> — Specialised: vendors, engineers, development team</li></ul><p><strong>The support process for every issue:</strong></p><ul><li><strong>1. Identify</strong> — What exactly is the problem? Get specifics, not "the computer is broken"</li><li><strong>2. Gather info</strong> — Error messages, when it started, what changed recently</li><li><strong>3. Isolate</strong> — Is it the hardware, software, network, or user?</li><li><strong>4. Research</strong> — Check knowledge base, search the error message</li><li><strong>5. Resolve</strong> — Apply the fix</li><li><strong>6. Document</strong> — Record the problem, cause, and solution in the ticketing system</li></ul><div class="highlight">📋 DOCUMENTATION is as important as the fix. Future problems are solved faster when solutions are documented. "I fixed it" is not documentation.</div>`},{type:'quiz',question:'What percentage of IT support issues are typically resolved at Tier 1 (first contact)?',opts:['20%','50%','80%','100%'],correct:2,explanation:'Well-run IT helpdesks resolve approximately 80% of issues at Tier 1 (first contact). These are common, repeatable issues: password resets, software not opening, printer not working, connectivity issues. Tier 1 agents who can handle this volume are extremely valuable.'}]},
      {title:'Diagnosing Common PC Problems',type:'lesson',xp:90,blocks:[{type:'text',content:`<h3>THE DIAGNOSTIC MINDSET</h3><p>Great tech support people think like detectives. Every problem has a cause. Find the cause, fix the symptom.</p>`,},{type:'table',headers:['Symptom','First Question','Common Causes'],rows:[['PC won\'t start','Any lights/sounds?','Power supply, power cable, hardware failure'],['Blue Screen (BSOD)','What\'s the error code?','Driver issue, RAM fault, overheating'],['Slow performance','When did this start?','Malware, full disk, too many startup programs'],['No internet','Others affected?','Router issue, NIC driver, IP conflict, ISP outage'],['Can\'t print','Is it online in Devices?','Driver, offline status, print queue stuck'],['USB not detected','Tried another port?','Driver issue, USB controller, device fault']]},{type:'practice',task:'A user says "my internet is not working." What is the FIRST question you ask?',hint:'Think about isolating whether the problem is on their device or the whole network',placeholder:'Type your diagnostic question...',answer:'Is anyone else in the office also unable to connect?',points:40}]},
      {title:'User Communication in Support',type:'lesson',xp:70,blocks:[{type:'text',content:`<h3>TECH SUPPORT IS PEOPLE WORK</h3><p>The technical skills get you the job. The communication skills keep you there and get you promoted. Frustrated users are not interested in technical explanations — they want their problem solved.</p><p><strong>Language that helps:</strong></p><ul><li>"I understand this is frustrating — let's get it sorted now."</li><li>"I can fix that for you right away."</li><li>"Let me check on that and get back to you within the hour."</li><li>"I've resolved the issue — here's what was causing it and what I did."</li></ul><p><strong>Language that hurts:</strong></p><ul><li>"Did you try turning it off and on again?" (condescending)</li><li>"That's not our problem." (never say this)</li><li>"I don't know." (say "Let me find out.")</li><li>Jargon-heavy explanations to non-technical users</li></ul><div class="tip">💡 RULE: Explain technical solutions to non-technical users using analogies they understand. "Your hard drive is 95% full — like a filing cabinet so full you can't close the drawer" is more useful than discussing disk fragmentation.</div>`},{type:'quiz',question:'A user angrily says their PC has been broken for 3 days. What is the BEST opening response?',opts:['"That\'s not my fault."','"I understand this has been frustrating — let\'s fix it right now."','"Did you try turning it off and on?"','"Log a ticket in the system."'],correct:1,explanation:'Acknowledge the frustration first, then take immediate action. "I understand this has been frustrating" validates their experience. "Let\'s fix it right now" shows urgency and ownership. This de-escalates the situation and builds trust instantly.'}]}
    ]
  },
  {
    id:'pc-troubleshooting', icon:'🛠️', name:'PC Troubleshooting', level:'tech',
    levelLabel:'TECH', color:'orange', duration:'2 Days', lessons:3,
    desc:'Diagnose and fix common PC problems. Slow systems, crashes, startup errors, driver issues. Real fix-it skills.',
    jobs:'Freelance Tech, Junior IT Support',
    topics:['Startup problems','Performance issues','Software errors','Hardware diagnostics'],
    lessonData:[
      {title:'PC Won\'t Start — Diagnosis Guide',type:'lesson',xp:90,blocks:[{type:'text',content:`<h3>PC WON'T BOOT — STEP BY STEP</h3><p>A PC that won't start is every user's worst nightmare. Work through this systematically and you'll find the cause every time.</p><p><strong>Step 1 — Check the obvious first:</strong></p><ul><li>Is it plugged in? Is the power strip on?</li><li>Is the monitor connected and on? (separate from the PC not starting)</li><li>Press the power button — any lights? Any fans spinning? Any beeps?</li></ul><p><strong>Step 2 — Interpret what you see/hear:</strong></p><ul><li><strong>No power at all</strong> (no lights, no fans) — Power supply or power cable issue</li><li><strong>Fans spin, no display</strong> — RAM, GPU, or monitor issue</li><li><strong>Beep codes</strong> — BIOS is communicating error codes through beeps (count them)</li><li><strong>Starts then restarts in a loop</strong> — Windows boot file corruption, hardware failure</li></ul><div class="highlight">🔧 THE "MINIMUM BOOT" TEST: Remove all non-essential hardware (extra RAM sticks, USB devices, additional drives). If it boots with minimum hardware, add components back one at a time to identify the fault.</div>`},{type:'quiz',question:'A PC powers on (fans spin, lights come on) but no image appears on screen. What should you check FIRST?',opts:['Reinstall Windows','Check the RAM is properly seated and the monitor cable is connected','Replace the hard drive','Update the drivers'],correct:1,explanation:'When a PC powers on but shows nothing on screen, the most common causes are: loose monitor cable, monitor not set to correct input, or RAM not fully seated. Check these physically first before any software diagnosis.'}]},
      {title:'Slow PC — Finding & Fixing the Cause',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>DIAGNOSING A SLOW COMPUTER</h3><p>A slow PC has a cause. Find the cause, fix the cause. Never just "clean up" randomly without knowing what's causing the slowdown.</p><p><strong>Use Task Manager to diagnose (Ctrl+Shift+Esc):</strong></p><ul><li>Click the <strong>Performance tab</strong> — see real-time CPU, Memory, Disk, and Network usage</li><li>Click the <strong>Processes tab</strong> — see exactly which programs are using the most resources</li><li>Sort by CPU or Memory column to find the culprit</li></ul><p><strong>Common causes and fixes:</strong></p>`,},{type:'table',headers:['Cause','How to Identify','Fix'],rows:[['Too many startup programs','Task Manager → Startup tab','Disable unnecessary startup items'],['Malware','Antivirus scan, high CPU usage by unknown process','Run Malwarebytes scan'],['Full hard drive (under 15% free)','File Explorer → This PC → check free space','Delete files, run Disk Cleanup'],['Too little RAM','Task Manager → Memory usage at 90%+','Close tabs/programs, or upgrade RAM'],['Overheating','PC fan very loud, thermal throttling','Clean dust from fans, check temps']]},{type:'quiz',question:'Which Task Manager tab shows you which programs are slowing down your PC RIGHT NOW?',opts:['Services tab','Users tab','Processes tab','Details tab'],correct:2,explanation:'The Processes tab in Task Manager shows all running programs and their real-time CPU, Memory, Disk, and Network usage. Sort by CPU or Memory column (click the column header) to instantly identify what\'s consuming the most resources.'}]},
      {title:'Software Errors & Crash Recovery',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>WHEN SOFTWARE BREAKS</h3><p>Software errors are the most common IT support request. Most have simple solutions once you know what to look for.</p><p><strong>The universal first steps:</strong></p><ul><li><strong>Restart the application</strong> — Close completely (Task Manager if needed), reopen</li><li><strong>Restart Windows</strong> — Clears temporary files and resets system state. Fixes 40% of software issues</li><li><strong>Check for updates</strong> — Outdated software has bugs. Update it.</li><li><strong>Run as Administrator</strong> — Right-click the program → "Run as administrator"</li><li><strong>Repair the installation</strong> — Settings → Apps → select the program → Modify/Repair</li><li><strong>Uninstall and reinstall</strong> — Last resort for software issues</li></ul><div class="highlight">🔍 SEARCH THE ERROR MESSAGE: Copy the exact error message text and search it on Google with "Windows 10" or "Windows 11" added. The answer almost always exists on Microsoft's support site or a tech forum.</div>`},{type:'quiz',question:'What percentage of software problems are typically solved by simply restarting Windows?',opts:['5%','15%','40%','90%'],correct:2,explanation:'A Windows restart clears temporary files, resets RAM allocation, restarts background services, and applies pending updates. Approximately 40% of "my program isn\'t working" issues are resolved by a simple restart — which is why it\'s always the first recommendation.'}]}
    ]

  {
    id:'windows-install', icon:'💿', name:'Windows Installation', level:'tech',
    levelLabel:'TECH', color:'orange', duration:'1-2 Days', lessons:3,
    desc:'Install Windows 10/11 from scratch. Bootable USB, BIOS, partitioning, drivers. A paid skill in high demand.',
    jobs:'Freelance Tech, Junior IT Support',
    topics:['Bootable USB creation','BIOS settings','Windows installation','Driver setup'],
    lessonData:[
      {title:'Creating a Bootable USB',type:'lesson',xp:90,blocks:[{type:'text',content:`<h3>BOOTABLE USB — YOUR INSTALLATION TOOL</h3><p>A bootable USB is a flash drive that contains a complete Windows installer. When you plug it in and start the PC from it, it loads the Windows setup — even if Windows isn't installed at all.</p><p><strong>What you need:</strong></p><ul><li>USB flash drive — minimum 8GB (16GB recommended), formatted (will be wiped)</li><li>A working PC to create the USB on</li><li>Internet connection to download Windows media creation tool</li></ul><p><strong>Creating using Windows Media Creation Tool (official Microsoft method):</strong></p><ul><li>Download "Media Creation Tool" from microsoft.com/software-download/windows11</li><li>Run it and select "Create installation media for another PC"</li><li>Select Language, Edition (Windows 11), Architecture (64-bit)</li><li>Select "USB flash drive" → select your USB → tool downloads and creates bootable USB</li><li>Process takes 20-40 minutes depending on internet speed</li></ul><div class="highlight">⚠️ ALL DATA ON THE USB WILL BE DELETED during this process. Back up anything on the USB before you start.</div>`},{type:'quiz',question:'What is the minimum recommended USB size for creating a Windows bootable drive?',opts:['2GB','4GB','8GB','32GB'],correct:2,explanation:'Windows 11 installation files are approximately 5.5GB. An 8GB USB is the minimum functional size, but 16GB is recommended to ensure there\'s enough space and to accommodate any updates included in newer ISO versions.'}]},
      {title:'BIOS & Boot Order',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>BIOS — THE PC'S COMMAND BEFORE WINDOWS</h3><p>The BIOS (or UEFI on modern PCs) is the firmware that runs before Windows. It controls hardware settings and decides what the PC boots from.</p><p><strong>Accessing BIOS:</strong></p><ul><li>Press the BIOS key immediately when the PC starts (before Windows loads)</li><li>Common keys: <strong>F2, F12, DEL, F10</strong> (depends on manufacturer)</li><li>Look for the key on screen during startup — it shows briefly</li></ul><p><strong>Changing the boot order to boot from USB:</strong></p><ul><li>In BIOS, find "Boot" tab or "Boot Order" section</li><li>Move "USB Drive" or "Removable Drive" to position #1 (before Hard Drive)</li><li>Save and exit (usually F10 → Save Changes)</li><li>PC restarts and loads from USB instead of hard drive</li></ul><div class="tip">💡 FASTER METHOD: Most modern PCs have a one-time Boot Menu. Press F12 (or F8/F11) at startup to select the boot device without changing BIOS settings permanently.</div>`},{type:'quiz',question:'Which key commonly opens the one-time Boot Menu to select a boot device without changing BIOS settings?',opts:['F1','F5','F12','Escape'],correct:2,explanation:'F12 opens the Boot Menu on most Dell, Lenovo, and other PC brands. This lets you choose a boot device (USB, DVD, Hard Drive) for one boot only — without permanently changing BIOS boot order. Different manufacturers use different keys: check your screen at startup.'}]},
      {title:'Windows Installation Walkthrough',type:'lesson',xp:100,blocks:[{type:'text',content:`<h3>INSTALLING WINDOWS — STEP BY STEP</h3><p>Once you've booted from the USB, the Windows installer guides you. But knowing what each step means prevents expensive mistakes — especially when partitioning.</p><p><strong>The installation steps:</strong></p><ul><li><strong>1. Language & region</strong> — Select language, time format, keyboard layout → Next</li><li><strong>2. Install Now</strong> — Click the Install Now button</li><li><strong>3. Product Key</strong> — Enter your Windows key or click "I don't have a product key" (activates later)</li><li><strong>4. Select Edition</strong> — Windows 11 Home or Pro (match your licence)</li><li><strong>5. Accept license</strong> — Accept → Next</li><li><strong>6. Installation type</strong> — Choose "Custom: Install Windows only (advanced)"</li><li><strong>7. Partitioning</strong> — Select the drive. Delete all old partitions if clean install. Click "New" to create fresh partition → Next</li><li><strong>8. Installing</strong> — Process takes 15-30 minutes. PC restarts several times</li><li><strong>9. Initial setup (OOBE)</strong> — Set region, keyboard, account (use local account for work PCs)</li></ul><div class="highlight">⚠️ CRITICAL: Step 7 — Partitioning DELETES ALL DATA on that drive. Confirm you have backed up or that the drive is intentionally being wiped. There is no undo.</div>`},{type:'quiz',question:'During Windows installation, which installation type should you choose for a clean install?',opts:['Upgrade: Keep files and settings','Custom: Install Windows only (advanced)','Express Install','Basic Install'],correct:1,explanation:'"Custom: Install Windows only (advanced)" gives you full control over partitioning and performs a completely clean installation. "Upgrade" keeps your files and settings but can carry over old problems. For a fresh start or new drive, always use Custom.'}]}
    ]

    levelLabel:'TECH', color:'orange', duration:'Half Day', lessons:2,

    jobs:'Office Tech Support, Freelance, Admin',

    lessonData:[
      {title:'Installing a Printer',type:'lesson',xp:70,blocks:[{type:'text',content:`<h3>PRINTER SETUP — WIRED & WIRELESS</h3><p>Printers are a source of endless office frustration. The person who can set them up and fix them is invaluable in any workplace.</p><p><strong>USB (Wired) Printer:</strong></p><ul><li>Connect USB cable from printer to PC</li><li>Turn printer on</li><li>Windows usually auto-installs — wait for notification</li><li>If not: Settings → Bluetooth & Devices → Printers & Scanners → Add Device</li><li>If driver needed: go to manufacturer's website (hp.com, epson.com, canon.com) → Support → Drivers → enter model number</li></ul><p><strong>Wireless Printer:</strong></p><ul><li>On the printer's display: Settings/Network → Wireless Setup Wizard → select your Wi-Fi network → enter password</li><li>On Windows: Settings → Bluetooth & Devices → Printers & Scanners → Add Device → select printer</li><li>Alternatively: install manufacturer's app (HP Smart, Epson iPrint) which guides you through setup</li></ul><div class="tip">💡 IMPORTANT: The printer and the PC must be on the SAME Wi-Fi network for wireless printing to work. This is the #1 cause of "my wireless printer won't work."</div>`},{type:'quiz',question:'What is the most common reason a wireless printer fails to print?',opts:['The ink is low','The printer driver is outdated','The printer and computer are on different Wi-Fi networks','The USB cable is disconnected'],correct:2,explanation:'Wireless printers and computers must be on the same network. A printer connected to "Home_WiFi_2" cannot communicate with a laptop on "Home_WiFi_5GHz". This is the first thing to check — and the most commonly overlooked.'}]},
      {title:'Print Queue & Troubleshooting',type:'lesson',xp:70,blocks:[{type:'text',content:`<h3>WHEN PRINTING GOES WRONG</h3><p>Printer problems follow predictable patterns. Know the patterns, fix the problems fast.</p><p><strong>The stuck print queue fix (most common printer issue):</strong></p><ul><li>Open <strong>Settings → Bluetooth & Devices → Printers & Scanners</strong></li><li>Click the printer → <strong>Open Print Queue</strong></li><li>Select all jobs → Delete</li><li>If queue won't clear: open <strong>Services</strong> (search in Start) → find <strong>Print Spooler</strong> → right-click → <strong>Stop</strong></li><li>Go to <strong>C:\\Windows\\System32\\spool\\PRINTERS</strong> → delete all files inside (not the folder)</li><li>Go back to Services → Start the Print Spooler service</li><li>Try printing again</li></ul><p><strong>Printer showing as "Offline":</strong></p><ul><li>Right-click the printer → "See what's printing" → Printer menu → uncheck "Use Printer Offline"</li><li>Restart both printer and PC</li><li>Re-add the printer if issue persists</li></ul>`},{type:'quiz',question:'What Windows service must be stopped and restarted to clear a stuck print queue?',opts:['Windows Print Manager','Print Spooler','Document Queue Service','Printer Driver Service'],correct:1,explanation:'The Print Spooler service manages all print jobs. When it gets stuck (common after a failed print job), stopping the service, deleting files in the PRINTERS folder, and restarting it clears the jam. This fix works on 90% of stuck-queue problems.'}]}
    ]
  },
  {
    id:'networking-basics', icon:'🌐', name:'Internet & Networking Basics', level:'tech',
    levelLabel:'TECH', color:'orange', duration:'2 Days', lessons:3,
    desc:'How networks work, router setup, Wi-Fi troubleshooting, IP addresses, and basic LAN configuration.',
    jobs:'Junior IT Support, Network Assistant',
    topics:['How the internet works','IP addresses','Router setup','Wi-Fi troubleshooting','Network sharing'],
    lessonData:[
      {title:'How the Internet Works',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>THE INTERNET — UNDERSTANDING THE INFRASTRUCTURE</h3><p>The internet is a massive global network of interconnected computers. Understanding how data travels helps you diagnose connection problems.</p><p><strong>The journey of a webpage request:</strong></p><ul><li>You type "google.com" → your browser asks your <strong>DNS server</strong> for Google's IP address</li><li>DNS returns the IP address (e.g. 142.250.80.46)</li><li>Your browser sends a request to that IP address</li><li>The request travels through your router → your ISP → multiple internet routers → Google's servers</li><li>Google's server sends back the webpage data</li><li>Your browser assembles and displays the page</li><li>This entire process happens in under 200 milliseconds</li></ul><p><strong>Key infrastructure elements:</strong></p><ul><li><strong>ISP (Internet Service Provider)</strong> — Telkom, Vodacom, MTN — your connection to the internet backbone</li><li><strong>Router</strong> — Your home/office gateway between your local network and the ISP</li><li><strong>Modem</strong> — Converts ISP signal (fibre, ADSL, LTE) to Ethernet/Wi-Fi</li></ul>`},{type:'quiz',question:'What does ISP stand for?',opts:['Internal Server Protocol','Internet Service Provider','Integrated System Port','Internet Security Program'],correct:1,explanation:'ISP = Internet Service Provider. In South Africa: Telkom, Vodacom, MTN, Rain, Openserve, Vumatel (for fibre). Your ISP connects your home or office to the global internet backbone. The quality and speed of your connection depends primarily on your ISP and your plan.'}]},
      {title:'IP Addresses & Network Configuration',type:'lesson',xp:90,blocks:[{type:'text',content:`<h3>IP ADDRESSES — THE INTERNET'S POSTAL SYSTEM</h3><p>Every device on a network has an IP address — its unique identifier. Without IP addresses, data wouldn't know where to go.</p><p><strong>Two types of IP addresses:</strong></p><ul><li><strong>Public IP</strong> — Your network's address on the internet. Assigned by your ISP. Changes periodically. One address for your entire home/office.</li><li><strong>Private/Local IP</strong> — Your device's address on your local network. Assigned by your router. e.g. 192.168.1.x or 10.0.0.x</li></ul><p><strong>Finding your IP address:</strong></p><ul><li><strong>Local IP</strong> — Open Command Prompt → type <strong>ipconfig</strong> → look for IPv4 Address</li><li><strong>Public IP</strong> — Go to whatismyip.com</li></ul><div class="highlight">🔧 COMMON FIX: "IP address conflict" error means two devices on the network have the same IP. Fix: Open Command Prompt → type "ipconfig /release" then "ipconfig /renew" — this requests a new IP from the router's DHCP.</div>`},{type:'practice',task:'What command do you type in Command Prompt to see your computer\'s local IP address?',hint:'It\'s a short command showing IP configuration',placeholder:'Type the command...',answer:'ipconfig',points:30}]},
      {title:'Wi-Fi Troubleshooting',type:'lesson',xp:80,blocks:[{type:'text',content:`<h3>WI-FI PROBLEMS — SYSTEMATIC FIXES</h3><p>Wi-Fi issues are the most common tech support call. Work through this process and resolve them every time.</p><p><strong>The troubleshooting order (most to least likely cause):</strong></p><ul><li><strong>1. Is anyone else affected?</strong> — Yes: router/ISP issue. No: your device issue</li><li><strong>2. Restart your device</strong> — Fixes 30% of Wi-Fi issues</li><li><strong>3. Restart the router</strong> — Unplug power for 30 seconds, plug back in, wait 2 minutes</li><li><strong>4. Forget and rejoin the network</strong> — Settings → Wi-Fi → your network → Forget → reconnect with password</li><li><strong>5. Check for IP conflict</strong> — ipconfig /release then /renew in Command Prompt</li><li><strong>6. Update network adapter driver</strong> — Device Manager → Network Adapters → right-click → Update driver</li><li><strong>7. Run Windows Network Troubleshooter</strong> — Settings → System → Troubleshoot → Internet Connections</li></ul><div class="tip">💡 SPEED ISSUE (not connectivity): Test at fast.com or speedtest.net. If speed is much lower than your package, try connecting by Ethernet cable. If wired speed is fine but Wi-Fi is slow, the issue is Wi-Fi range, interference, or the wireless adapter.</div>`},{type:'quiz',question:'When troubleshooting Wi-Fi, what does it mean if EVERYONE in the office is affected?',opts:['All computers need driver updates','The problem is with the router or ISP — not individual devices','All devices need to be restarted','The Wi-Fi password has changed'],correct:1,explanation:'If multiple people/devices are all affected simultaneously, the problem is upstream from the devices — either the router (restart it) or the ISP (call your provider). Updating drivers or restarting individual PCs would be a waste of time.'}]}
    ]
  }
];

/* ============================================================
   STATE
   ============================================================ */
let state = {
  xp: 0,
  streak: 1,
  currentCourse: null,
  currentLesson: null,
  view: 'home', // home | course | lesson
  progress: {} // courseId: { completed: [lessonIndex,...], started: true }
};

function getProgress(courseId) {
  if (!state.progress[courseId]) state.progress[courseId] = { completed: [] };
  return state.progress[courseId];
}

function isLessonComplete(courseId, idx) {
  return getProgress(courseId).completed.includes(idx);
}

function completeLesson(courseId, idx, xpVal) {
  const p = getProgress(courseId);
  if (!p.completed.includes(idx)) {
    p.completed.push(idx);
    state.xp += xpVal;
    updateXPDisplay();
    updateOverallProgress();
    updateSidebar();
  }
}

function updateXPDisplay() {
  document.getElementById('xpDisplay').textContent = state.xp;
  document.getElementById('totalXP').textContent = state.xp + ' XP';
}

function updateOverallProgress() {
  const totalLessons = COURSES.reduce((a, c) => a + c.lessonData.length, 0);
  const doneLessons = Object.values(state.progress).reduce((a, p) => a + p.completed.length, 0);
  const pct = Math.round((doneLessons / totalLessons) * 100);
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('overallPct').textContent = pct + '%';
}

/* ============================================================
   SIDEBAR
   ============================================================ */
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = `<div class="nav-section-label">— HOME</div>
  <div class="nav-item ${state.view==='home'?'active':''}" onclick="showHome()">
    <span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span>
  </div>
  <div class="nav-item ${state.view==='tests'?'active':''}" onclick="showTestCentre()">
    <span class="nav-icon">🧪</span><span class="nav-text">Test Centre</span>
    <span class="nav-badge" style="background:rgba(255,179,71,.15);color:#ffb347;border-color:rgba(255,179,71,.3);">${Object.values(state.progress).filter(p=>p.testPassed).length}/${TESTS.length}</span>
  </div>
  <div class="nav-section-label">— ALL COURSES</div>`;

  COURSES.forEach(c => {
    const prog = getProgress(c.id);
    const done = prog.completed.length;
    const total = c.lessonData.length;
    const isActive = state.currentCourse?.id === c.id;
    const isDone = done === total;
    nav.innerHTML += `<div class="nav-item ${isActive?'active':''} ${isDone?'completed':''}" onclick="openCourse('${c.id}')">
      <span class="nav-icon">${c.icon}</span>
      <span class="nav-text">${c.name}</span>
      ${isDone ? '<span class="nav-check">✓</span>' : `<span class="nav-badge ${done>0?'done':'locked'}">${done}/${total}</span>`}
    </div>`;
  });
}

function updateSidebar() { buildSidebar(); }

/* ============================================================
   VIEWS
   ============================================================ */
function setTopbar(title, course) {
  document.getElementById('topbarTitle').textContent = title;
  document.getElementById('topbarCourse').textContent = course;
}

function showHome() {
  state.view = 'home';
  state.currentCourse = null;
  state.currentLesson = null;
  setTopbar('ACADEMY HOME', 'PIXELPROTECH SOLUTIONS');
  updateSidebar();

  const doneLessons = Object.values(state.progress).reduce((a, p) => a + p.completed.length, 0);
  const totalLessons = COURSES.reduce((a, c) => a + c.lessonData.length, 0);
  const doneCourses = COURSES.filter(c => getProgress(c.id).completed.length === c.lessonData.length).length;

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
  <div class="home-hero">
    <div class="hh-greeting">— WELCOME BACK TO PIXELPROTECH</div>
    <h1 class="hh-title">YOUR SKILLS.<br><span>YOUR FUTURE.</span></h1>
    <p class="hh-sub">Every lesson you complete is a skill added to your toolbox. Pick a course and let's go — no gatekeeping here.</p>
    <div class="hh-stats">
      <div class="hh-stat"><div class="hh-stat-num">${state.xp}</div><div class="hh-stat-label">XP EARNED</div></div>
      <div class="hh-stat"><div class="hh-stat-num">${doneLessons}</div><div class="hh-stat-label">LESSONS DONE</div></div>
      <div class="hh-stat"><div class="hh-stat-num">${totalLessons - doneLessons}</div><div class="hh-stat-label">REMAINING</div></div>

function openCourse(courseId) {
  const course = COURSES.find(c => c.id === courseId);
  state.currentCourse = course;
  state.currentLesson = null;
  state.view = 'course';
  setTopbar(course.name.toUpperCase(), '— COURSE OVERVIEW');

  <div class="course-hero">

    <h1 class="ch-title">${course.name.replace(' ',' <span>')} </span></h1>

function openLesson(courseId, lessonIdx) {
  const course = COURSES.find(c => c.id === courseId);
  const lesson = course.lessonData[lessonIdx];
  state.currentLesson = lessonIdx;
  setTopbar(lesson.title.toUpperCase(), course.name + ' — LESSON ' + (lessonIdx + 1));
  updateSidebar();

  const isLast = lessonIdx === course.lessonData.length - 1;
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
  <div class="lv-header">
    <button class="lv-back" onclick="openCourse('${courseId}')">← BACK TO COURSE</button>
    <h2 class="lv-title">${lesson.title}</h2>

      <span class="lesson-xp">+${lesson.xp} XP on completion</span>
    </div>
  </div>
  <div class="content-blocks" id="contentBlocks">
    ${lesson.blocks.map((b, bi) => renderBlock(b, courseId, lessonIdx, bi)).join('')}

}

/* ============================================================
   BLOCK RENDERER
   ============================================================ */
function renderBlock(block, courseId, lessonIdx, bi) {
  switch(block.type) {
    case 'text':
      return `<div class="block block-text">${block.content}</div>`;

    case 'table':
      return `<div class="block block-visual">
        <div class="visual-label">— REFERENCE TABLE</div>
        <table class="table-demo">
          <thead><tr>${block.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${block.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;

    case 'shortcuts':
      return `<div class="block block-visual">
        <div class="visual-label">— KEYBOARD SHORTCUTS</div>
        <div class="shortcut-grid">
          ${block.items.map(s=>`<div class="shortcut-item"><span class="shortcut-key">${s.key}</span><span class="shortcut-desc">${s.desc}</span></div>`).join('')}
        </div>
      </div>`;

    case 'visual':
      if (block.content === 'parts') {
        return `<div class="block block-visual">
          <div class="visual-label">— COMPUTER COMPONENTS</div>
          <div class="shortcut-grid">
            <div class="shortcut-item"><span class="shortcut-key">CPU</span><span class="shortcut-desc">The brain — processes everything</span></div>
            <div class="shortcut-item"><span class="shortcut-key">RAM</span><span class="shortcut-desc">Short-term memory — speed</span></div>
            <div class="shortcut-item"><span class="shortcut-key">HDD/SSD</span><span class="shortcut-desc">Long-term storage — saves files</span></div>
            <div class="shortcut-item"><span class="shortcut-key">GPU</span><span class="shortcut-desc">Graphics card — visuals</span></div>
            <div class="shortcut-item"><span class="shortcut-key">Monitor</span><span class="shortcut-desc">Output — shows everything</span></div>
            <div class="shortcut-item"><span class="shortcut-key">Motherboard</span><span class="shortcut-desc">Connects all components</span></div>
          </div>
        </div>`;
      }
      return `<div class="block block-visual"><div class="visual-label">${block.label||'VISUAL'}</div></div>`;

    case 'quiz':
      return `<div class="block block-quiz" id="quiz_${bi}">
        <div class="quiz-q">❓ ${block.question}</div>
        <div class="quiz-opts">
          ${block.opts.map((o,oi)=>`<div class="quiz-opt" id="qo_${bi}_${oi}" onclick="answerQuiz(${bi},${oi},${block.correct})">
            <div class="quiz-letter">${['A','B','C','D'][oi]}</div>
            <span>${o}</span>
          </div>`).join('')}
        </div>
        <div class="quiz-feedback" id="qfb_${bi}"></div>
      </div>`;

    case 'practice':
      return `<div class="block block-practice" id="prac_${bi}">
        <div class="practice-label">— PRACTICE EXERCISE</div>
        <div class="practice-task">${block.task}</div>
        <div class="practice-hint">💡 Hint: ${block.hint}</div>
        <input class="practice-input" id="pinput_${bi}" type="text" placeholder="${block.placeholder||'Type your answer here...'}" onkeydown="if(event.key==='Enter')checkPractice(${bi},'${escapeAnswer(block.answer)}',${block.points||30})"/>
        <div class="practice-btns">
          <button class="btn-check" onclick="checkPractice(${bi},'${escapeAnswer(block.answer)}',${block.points||30})">CHECK ANSWER</button>
          <button class="btn-hint" onclick="showHint(${bi},'${escapeAnswer(block.hint)}')">SHOW HINT</button>
        </div>
        <div class="practice-result" id="pres_${bi}"></div>
      </div>`;

    case 'typing':
      return `<div class="block block-practice">
        <div class="practice-label">— TYPING SPEED TEST</div>
        <div class="practice-task">Type the following text as fast and accurately as you can:</div>
        <div class="typing-area">
          <div class="typing-target" id="typingTarget_${bi}">${block.target}</div>
          <input class="typing-field" id="typingField_${bi}" data-target="${block.target}" data-block="${bi}" placeholder="Start typing here..." autocomplete="off" autocorrect="off" spellcheck="false"/>
        </div>
        <div class="typing-stats" id="typingStats_${bi}">
          <span>WPM: <span id="wpm_${bi}">0</span></span>
          <span>Accuracy: <span id="acc_${bi}">100</span>%</span>
          <span>Progress: <span id="tprog_${bi}">0</span>/${block.target.length} chars</span>
        </div>
      </div>`;

    default:
      return '';
  }
}

function escapeAnswer(s) {
  return (s || '').replace(/'/g, "\\'").toLowerCase();
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
function answerQuiz(bi, chosen, correct) {
  const opts = document.querySelectorAll(`#qo_${bi}_0, #qo_${bi}_1, #qo_${bi}_2, #qo_${bi}_3`);
  opts.forEach((el, i) => {
    el.onclick = null;
    if (i === correct) el.classList.add('correct');
    else if (i === chosen && chosen !== correct) el.classList.add('wrong');
  });
  const fb = document.getElementById(`qfb_${bi}`);
  const blocks = state.currentCourse?.lessonData[state.currentLesson]?.blocks;
  const explanation = blocks?.[bi]?.explanation || '';
  if (chosen === correct) {
    fb.className = 'quiz-feedback correct';
    fb.textContent = '✅ Correct! ' + explanation;
    showXPToast('+10 XP');
  } else {
    fb.className = 'quiz-feedback wrong';
    fb.textContent = '❌ Not quite. ' + explanation;
  }
}

function checkPractice(bi, answer, points) {
  const input = document.getElementById(`pinput_${bi}`);
  const result = document.getElementById(`pres_${bi}`);
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = answer.toLowerCase();

  if (userAnswer.includes(correctAnswer) || correctAnswer.includes(userAnswer)) {
    input.classList.add('correct-ans');
    result.className = 'practice-result show ok';
    result.textContent = '✅ Great answer! +' + points + ' XP';
    showXPToast('+' + points + ' XP');
  } else {
    input.classList.add('wrong-ans');
    result.className = 'practice-result show no';
    result.textContent = '❌ Not quite right. Try again or check the hint above.';
    setTimeout(() => { input.classList.remove('wrong-ans'); input.value = ''; }, 1500);
  }
}

function showHint(bi, hint) {
  const res = document.getElementById(`pres_${bi}`);
  res.className = 'practice-result show ok';
  res.style.color = 'var(--warning)';
  res.textContent = '💡 Hint: ' + hint;
}

function completeLessonUI(courseId, idx, xpVal) {
  const course = COURSES.find(c => c.id === courseId);
  const wasComplete = isLessonComplete(courseId, idx);
  completeLesson(courseId, idx, wasComplete ? 0 : xpVal);
  const isLast = idx === course.lessonData.length - 1;

  if (!wasComplete) {
    showAchievement(
      isLast ? '🏆' : '⚡',
      isLast ? 'COURSE MODULE COMPLETE!' : 'LESSON COMPLETE!',
      isLast ? course.name + ' — all lessons done.' : 'Keep the momentum going.',
      '+' + xpVal + ' XP',
      () => {
        if (isLast) openCourse(courseId);
        else openLesson(courseId, idx + 1);
      }
    );
  } else {
    if (isLast) openCourse(courseId);
    else openLesson(courseId, idx + 1);
  }
}

/* ============================================================
   TYPING TEST
   ============================================================ */
function initTypingTests() {
  document.querySelectorAll('.typing-field').forEach(field => {
    const bi = field.dataset.block;
    const target = field.dataset.target;
    let startTime = null;

    field.addEventListener('input', function() {
      if (!startTime) startTime = Date.now();
      const typed = this.value;
      const elapsed = (Date.now() - startTime) / 1000 / 60;

      let correct = 0, wrong = 0;
      let html = '';
      for (let i = 0; i < target.length; i++) {
        if (i < typed.length) {
          if (typed[i] === target[i]) { html += `<span class="correct-char">${target[i]}</span>`; correct++; }
          else { html += `<span class="wrong-char">${target[i]}</span>`; wrong++; }
        } else if (i === typed.length) {
          html += `<span class="current-char">${target[i]}</span>`;
        } else {
          html += target[i];
        }
      }

      document.getElementById(`typingTarget_${bi}`).innerHTML = html;
      const wpm = elapsed > 0 ? Math.round((typed.split(' ').length) / elapsed) : 0;
      const acc = typed.length > 0 ? Math.round((correct / typed.length) * 100) : 100;
      document.getElementById(`wpm_${bi}`).textContent = wpm;
      document.getElementById(`acc_${bi}`).textContent = acc;
      document.getElementById(`tprog_${bi}`).textContent = typed.length;

      if (typed.length >= target.length) {
        showXPToast('TYPING TEST DONE! ' + wpm + ' WPM');
      }
    });
  });
}

   ============================================================ */
let achCallback = null;
function showAchievement(emoji, title, sub, xp, cb) {
  document.getElementById('achEmoji').textContent = emoji;
  document.getElementById('achTitle').textContent = title;
  document.getElementById('achSub').textContent = sub;
  document.getElementById('achXp').textContent = xp;
  document.getElementById('achPopup').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  achCallback = cb;
}
function closeAchievement() {
  document.getElementById('achPopup').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  if (achCallback) { achCallback(); achCallback = null; }
}

function showXPToast(msg) {
  const t = document.getElementById('xpToast');
  document.getElementById('xpToastText').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function startTest(courseId) {
  const test = TESTS.find(t => t.courseId === courseId);
  testState = {
    active: true,
    courseId,
    questions: [...test.questions].sort(() => Math.random() - 0.5),
    current: 0,
    score: 0,
    answers: [],
    startTime: Date.now()
  };
  renderQuestion();
}

function renderQuestion() {
  const test = TESTS.find(t => t.courseId === testState.courseId);
  const q = testState.questions[testState.current];
  const num = testState.current + 1;
  const total = testState.questions.length;
  const pct = Math.round(((num-1)/total)*100);

  setTopbar(`QUESTION ${num} OF ${total}`, test.title.toUpperCase() + ' TEST');

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
  <div style="max-width:680px;margin:0 auto;">
    <!-- progress -->
    <div style="margin-bottom:32px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);">QUESTION ${num} OF ${total}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--teal);">${testState.score} CORRECT SO FAR</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:var(--grad);border-radius:3px;transition:width .5s ease;"></div>
      </div>

        ${testState.questions.map((_,i) => `<div style="flex:1;height:4px;border-radius:2px;background:${i < testState.current ? (testState.answers[i]==='correct'?'var(--teal)':'var(--danger)') : i===testState.current ? 'var(--purple)' : 'var(--border)'};transition:background .3s;"></div>`).join('')}

    <!-- two options -->

        <div style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:rgba(123,47,255,.15);position:absolute;top:8px;right:16px;line-height:1;">A</div>

        <div style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:rgba(0,212,170,.12);position:absolute;top:8px;right:16px;line-height:1;">B</div>

    <!-- hint -->
    <div style="text-align:center;margin-top:20px;">
      <button onclick="showTestCentre()" style="background:none;border:none;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.2);cursor:none;transition:color .2s;" onmouseover="this.style.color='var(--muted)'" onmouseout="this.style.color='rgba(255,255,255,.2)'">← EXIT TEST</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

function selectAnswer(chosen, correct) {
  // Lock options
  document.querySelectorAll('.test-opt').forEach(el => el.onclick = null);

  const isCorrect = chosen === correct;
  if (isCorrect) testState.score++;
  testState.answers.push(isCorrect ? 'correct' : 'wrong');

  // Visual feedback
  const chosenEl = document.getElementById(chosen === 'a' ? 'optA' : 'optB');
  const correctEl = document.getElementById(correct === 'a' ? 'optA' : 'optB');

  if (isCorrect) {
    chosenEl.style.borderColor = 'var(--teal)';
    chosenEl.style.background = 'rgba(0,212,170,.1)';
    showXPToast('✅ CORRECT! +15 XP');
    state.xp += 15;
    updateXPDisplay();
  } else {
    chosenEl.style.borderColor = 'var(--danger)';
    chosenEl.style.background = 'rgba(255,77,109,.08)';
    correctEl.style.borderColor = 'var(--teal)';
    correctEl.style.background = 'rgba(0,212,170,.08)';
    showXPToast('❌ Wrong — correct was ' + correct.toUpperCase());
  }

  // Add feedback label
  const fb = document.createElement('div');
  fb.style.cssText = `text-align:center;margin-top:20px;font-family:'Space Mono',monospace;font-size:12px;color:${isCorrect?'var(--teal)':'var(--danger)'};letter-spacing:1px;`;
  fb.textContent = isCorrect ? '✅ CORRECT!' : '❌ INCORRECT — Study this one again.';
  document.querySelector('#optionsGrid').after(fb);

  // Next question after delay
  setTimeout(() => {
    if (testState.current < testState.questions.length - 1) {
      testState.current++;
      renderQuestion();
    } else {
      showTestResult();
    }
  }, 1200);
}

function showTestResult() {
  const test = TESTS.find(t => t.courseId === testState.courseId);
  const score = testState.score;
  const total = testState.questions.length;
  const passed = score >= 6;
  const pct = Math.round((score/total)*100);
  const timeTaken = Math.round((Date.now() - testState.startTime) / 1000);
  const mins = Math.floor(timeTaken/60);
  const secs = timeTaken % 60;

  // Save result
  const prog = getProgress(testState.courseId);
  prog.testScore = score;
  if (passed && !prog.testPassed) {
    prog.testPassed = true;
    state.xp += 200;
    updateXPDisplay();
  }
  updateSidebar();

  setTopbar('TEST COMPLETE', test.title.toUpperCase());

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
  <div style="max-width:600px;margin:0 auto;text-align:center;">

    <!-- result card -->
    <div style="background:var(--card);border:2px solid ${passed?'rgba(0,212,170,.4)':'rgba(255,77,109,.3)'};border-radius:20px;padding:48px 40px;margin-bottom:24px;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,${passed?'rgba(0,212,170,.08)':'rgba(255,77,109,.06)'},transparent 60%);pointer-events:none;"></div>

      <div style="font-size:72px;margin-bottom:16px;filter:drop-shadow(0 0 20px ${passed?'rgba(0,212,170,.4)':'rgba(255,77,109,.3)'})">${passed?'🏆':'💡'}</div>

      <div style="font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,56px);line-height:1;margin-bottom:8px;background:${passed?'var(--grad)':'linear-gradient(90deg,#ff4d6d,#ff8c42)'};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
        ${passed ? 'TEST PASSED!' : 'KEEP STUDYING'}
      </div>

      <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;letter-spacing:1px;">
        ${test.icon} ${test.title.toUpperCase()}
      </div>

      <!-- big score -->
      <div style="display:flex;justify-content:center;align-items:baseline;gap:8px;margin-bottom:8px;">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:96px;line-height:1;color:${passed?'var(--teal)':'var(--danger)'};">${score}</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--muted);">/ ${total}</span>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;">${pct}% CORRECT · ${mins}m ${secs}s</div>

      <!-- answer breakdown -->
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:28px;">
        ${testState.answers.map((a,i) => `<div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:${a==='correct'?'rgba(0,212,170,.15)':'rgba(255,77,109,.15)'};border:1px solid ${a==='correct'?'rgba(0,212,170,.3)':'rgba(255,77,109,.3)'};">${a==='correct'?'✓':'✗'}</div>`).join('')}
      </div>

      ${passed ? `<div style="background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);border-radius:8px;padding:16px;margin-bottom:24px;font-family:'Space Mono',monospace;font-size:11px;color:var(--teal);letter-spacing:1px;">🏅 +200 XP EARNED · COURSE BADGE UNLOCKED</div>` : `<div style="background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);border-radius:8px;padding:16px;margin-bottom:24px;font-family:'Space Mono',monospace;font-size:11px;color:#ff4d6d;letter-spacing:1px;">Need 6/8 to pass · Review the lessons and try again</div>`}

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-start" onclick="startTest('${testState.courseId}')">🔄 RETRY TEST</button>
        <button class="btn-secondary" onclick="openCourse('${testState.courseId}')">📚 REVIEW LESSONS</button>
        <button class="btn-secondary" onclick="showTestCentre()">← ALL TESTS</button>
      </div>
    </div>

    <!-- motivational message -->
    <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8;letter-spacing:1px;">
      ${passed
        ? '"The skill is yours now. Nobody can take knowledge away from you." — Keep going.'
        : '"Every wrong answer is a gap you now know about. Study it. Nail it next time."'
      }
    </div>
  </div>`;
  window.scrollTo(0,0);
}

/* ============================================================
   MOBILE
   ============================================================ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ============================================================
   INIT
   ============================================================ */
buildSidebar();
showHome();
updateXPDisplay();
</script>
</body>
</html>
